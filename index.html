<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time's Music</title>
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a25;
            --bg-input: #1e1e2e;
            --text-primary: #e8e8f0;
            --text-secondary: #a0a0b8;
            --accent: #8b5cf6;
            --accent-hover: #a78bfa;
            --accent-glow: rgba(139, 92, 246, 0.3);
            --border: #2a2a3a;
            --radius: 16px;
            --radius-sm: 10px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
            padding-bottom: 100px;
        }

        /* ============ АНИМИРОВАННЫЙ ФОН ============ */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            animation: orbFloat 8s ease-in-out infinite;
        }

        .bg-orb:nth-child(1) {
            width: 400px; height: 400px;
            background: #8b5cf6;
            top: -100px; left: -100px;
            animation-delay: 0s;
        }

        .bg-orb:nth-child(2) {
            width: 350px; height: 350px;
            background: #a78bfa;
            bottom: -100px; right: -100px;
            animation-delay: -3s;
        }

        .bg-orb:nth-child(3) {
            width: 250px; height: 250px;
            background: #c084fc;
            top: 50%; left: 50%;
            animation-delay: -5s;
        }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(50px, -50px) scale(1.1); }
            50% { transform: translate(-30px, 30px) scale(0.9); }
            75% { transform: translate(-50px, -20px) scale(1.05); }
        }

        .bg-particles {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--accent);
            border-radius: 50%;
            animation: particleFloat 6s ease-in-out infinite;
            opacity: 0;
        }

        @keyframes particleFloat {
            0% { opacity: 0; transform: translateY(100vh) scale(0); }
            10% { opacity: 1; }
            90% { opacity: 0.5; }
            100% { opacity: 0; transform: translateY(-100vh) scale(1); }
        }

        /* ============ ЭКРАН ЗАГРУЗКИ ============ */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-primary);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        .loading-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loading-logo {
            width: 80px;
            height: auto;
            animation: loadPulse 1.5s ease-in-out infinite;
        }

        @keyframes loadPulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 20px rgba(139, 92, 246, 0.6)); }
            50% { transform: scale(1.15); filter: drop-shadow(0 0 40px rgba(139, 92, 246, 0.9)); }
        }

        .loading-bar-container {
            width: 200px;
            height: 3px;
            background: rgba(139, 92, 246, 0.2);
            border-radius: 10px;
            margin-top: 2rem;
            overflow: hidden;
        }

        .loading-bar {
            height: 100%;
            background: linear-gradient(90deg, #8b5cf6, #c084fc, #e9d5ff);
            border-radius: 10px;
            width: 0%;
            animation: loadingBar 2s ease-in-out forwards;
        }

        @keyframes loadingBar {
            0% { width: 0%; }
            50% { width: 70%; }
            100% { width: 100%; }
        }

        .loading-text {
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-top: 1rem;
            animation: fadeText 2s ease-in-out infinite;
        }

        @keyframes fadeText {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* ============ ОСНОВНОЙ КОНТЕНТ ============ */
        .main-content {
            position: relative;
            z-index: 1;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .main-content.visible {
            opacity: 1;
            transform: translateY(0);
        }

        header {
            background: linear-gradient(180deg, var(--bg-secondary) 0%, transparent 100%);
            padding: 2rem 1rem 1.5rem;
            text-align: center;
            position: relative;
        }

        header::after {
            content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 80px; height: 2px; background: linear-gradient(90deg, transparent, var(--accent), transparent);
            border-radius: 2px;
        }

        .logo-container { display: inline-block; margin-bottom: 0.5rem; animation: float 3s ease-in-out infinite; }
        .logo-svg { width: 70px; height: auto; filter: drop-shadow(0 0 20px rgba(139, 92, 246, 0.4)); }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        header h1 {
            font-size: 2rem; font-weight: 800;
            background: linear-gradient(135deg, var(--accent), #c084fc, #e9d5ff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }

        header .subtitle { color: var(--text-secondary); font-size: 0.9rem; margin-top: 0.2rem; }

        nav {
            background-color: rgba(18, 18, 26, 0.9); backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px); padding: 0.6rem 1rem; position: sticky; top: 0; z-index: 100;
            border-bottom: 1px solid var(--border);
            display: flex; justify-content: center; gap: 1rem; flex-wrap: wrap;
        }

        .search-input {
            background: var(--bg-input); border: 1px solid var(--border); color: var(--text-primary);
            padding: 0.5rem 1rem; border-radius: 50px; font-size: 0.85rem; min-width: 200px; max-width: 400px;
            transition: border-color var(--transition), box-shadow var(--transition);
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .section-title {
            max-width: 1300px; margin: 1.5rem auto 0; padding: 0 1rem;
            font-size: 1.2rem; font-weight: 700;
        }

        .music-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem; max-width: 1300px; margin: 0.8rem auto 1.5rem; padding: 0 1rem;
        }

        .track-card {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-sm);
            padding: 1rem; cursor: pointer; transition: all var(--transition);
            display: flex; flex-direction: column; justify-content: space-between; min-height: 100px;
            animation: cardIn 0.5s ease forwards;
            opacity: 0;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .track-card:hover { transform: translateY(-3px); border-color: var(--accent); }
        .track-card.active { border-color: var(--accent); box-shadow: 0 0 20px var(--accent-glow); }
        .track-card:active { transform: scale(0.98); }

        .track-title { font-size: 1rem; font-weight: 700; margin-bottom: 0.2rem; }
        .track-artist { color: var(--text-secondary); font-size: 0.8rem; }

        .player-bar {
            position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(26, 26, 37, 0.97);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-top: 1px solid var(--border);
            padding: 0.8rem 1.5rem; box-shadow: 0 -4px 30px rgba(0,0,0,0.5); z-index: 1000;
            display: flex; align-items: center; gap: 1.5rem;
            transform: translateY(100%);
            animation: slideUp 0.5s ease 1s forwards;
        }

        @keyframes slideUp {
            to { transform: translateY(0); }
        }

        .track-info { min-width: 150px; max-width: 250px; }
        .track-info h4 { font-size: 0.9rem; margin-bottom: 0.1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-info p { font-size: 0.75rem; color: var(--text-secondary); }

        .player-bar audio { flex: 1; max-width: 800px; height: 36px; }
        .player-bar audio::-webkit-media-controls-enclosure { background-color: var(--bg-input); }

        @media (max-width: 768px) {
            body { padding-bottom: 90px; }
            header h1 { font-size: 1.6rem; }
            .logo-svg { width: 55px; }
            .search-input { min-width: 100%; }
            .music-grid { grid-template-columns: 1fr; gap: 0.7rem; padding: 0 0.8rem; }
            .track-card { padding: 0.8rem; min-height: 85px; }
            .player-bar { flex-direction: column; padding: 0.6rem 1rem; gap: 0.4rem; }
            .track-info { min-width: 100%; max-width: 100%; text-align: center; }
            .player-bar audio { width: 100%; }
        }
    </style>
</head>
<body>

    <!-- Анимированный фон -->
    <div class="bg-animation">
        <div class="bg-orb"></div>
        <div class="bg-orb"></div>
        <div class="bg-orb"></div>
        <div class="bg-particles" id="particles"></div>
    </div>

    <!-- Экран загрузки -->
    <div class="loading-screen" id="loadingScreen">
        <svg class="loading-logo" viewBox="0 0 120 140" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="lsg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#c084fc"/><stop offset="100%" stop-color="#8b5cf6"/></linearGradient>
                <linearGradient id="lgg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#a78bfa" stop-opacity="0.6"/><stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.2"/></linearGradient>
                <clipPath id="lhc"><path d="M15 26 L105 26 L105 56 L60 70 L15 56 Z"/><path d="M15 110 L105 110 L105 86 L60 70 L15 86 Z"/></clipPath>
            </defs>
            <path d="M60 8 L105 34 L105 56 L60 70 L15 56 L15 34 Z" fill="url(#lgg)"/>
            <path d="M60 132 L15 108 L15 86 L60 70 L105 86 L105 108 Z" fill="url(#lgg)"/>
            <g clip-path="url(#lhc)">
                <rect x="15" y="26" width="90" height="30" fill="url(#lsg)">
                    <animate attributeName="y" values="26;56;56;26" dur="1.5s" repeatCount="indefinite"/>
                    <animate attributeName="height" values="30;0;0;30" dur="1.5s" repeatCount="indefinite"/>
                </rect>
                <rect x="15" y="110" width="90" height="0" fill="url(#lsg)">
                    <animate attributeName="y" values="110;86;86;110" dur="1.5s" repeatCount="indefinite"/>
                    <animate attributeName="height" values="0;24;24;0" dur="1.5s" repeatCount="indefinite"/>
                </rect>
            </g>
            <path d="M60 8 L105 34 L105 56 L60 70 L15 56 L15 34 Z" fill="none" stroke="#a78bfa" stroke-width="2"/>
            <path d="M60 132 L15 108 L15 86 L60 70 L105 86 L105 108 Z" fill="none" stroke="#a78bfa" stroke-width="2"/>
            <rect x="8" y="26" width="104" height="6" rx="3" fill="#a78bfa"/>
            <rect x="8" y="110" width="104" height="6" rx="3" fill="#a78bfa"/>
        </svg>
        <div class="loading-bar-container">
            <div class="loading-bar"></div>
        </div>
        <p class="loading-text">Загрузка Time's Music...</p>
    </div>

    <!-- Основной контент -->
    <div class="main-content" id="mainContent">
        <header>
            <div class="logo-container">
                <svg class="logo-svg" viewBox="0 0 120 140" fill="none" xmlns="w3.org">
                    <defs>
                        <linearGradient id="sandGradient" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#c084fc"/><stop offset="100%" stop-color="#8b5cf6"/></linearGradient>
                        <linearGradient id="glassGradient" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#a78bfa" stop-opacity="0.6"/><stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.2"/></linearGradient>
                        <clipPath id="hourglassClip"><path d="M15 26 L105 26 L105 56 L60 70 L15 56 Z"/><path d="M15 110 L105 110 L105 86 L60 70 L15 86 Z"/></clipPath>
                    </defs>
                    <path d="M60 8 L105 34 L105 56 L60 70 L15 56 L15 34 Z" fill="url(#glassGradient)"/>
                    <path d="M60 132 L15 108 L15 86 L60 70 L105 86 L105 108 Z" fill="url(#glassGradient)"/>
                    <g clip-path="url(#hourglassClip)">
                        <polygon class="sand-top" points="15,26 105,26 105,70 15,70" fill="url(#sandGradient)">
                            <animate attributeName="points" values="15,26 105,26 105,70 15,70; 15,26 105,26 105,70 15,70; 15,70 105,70 105,70 15,70; 15,70 105,70 105,70 15,70; 15,26 105,26 105,70 15,70" keyTimes="0; 0.2; 0.5; 0.7; 1" dur="5s" repeatCount="indefinite"/>
                        </polygon>
                        <rect x="10" y="110" width="100" height="0" fill="url(#sandGradient)">
                            <animate attributeName="y" values="110; 110; 70; 70; 70" keyTimes="0; 0.2; 0.5; 0.7; 1" dur="5s" repeatCount="indefinite"/>
                            <animate attributeName="height" values="0; 0; 40; 40; 0" keyTimes="0; 0.2; 0.5; 0.7; 1" dur="5s" repeatCount="indefinite"/>
                        </rect>
                        <line x1="60" y1="26" x2="60" y2="110" stroke="url(#sandGradient)" stroke-width="1.5"><animate attributeName="opacity" values="0; 1; 1; 0; 0" keyTimes="0; 0.2; 0.5; 0.7; 1" dur="5s" repeatCount="indefinite"/></line>
                    </g>
                    <path d="M60 8 L105 34 L105 56 L60 70 L15 56 L15 34 Z" fill="none" stroke="#a78bfa" stroke-width="2" stroke-linejoin="round"/>
                    <path d="M60 132 L15 108 L15 86 L60 70 L105 86 L105 108 Z" fill="none" stroke="#a78bfa" stroke-width="2" stroke-linejoin="round"/>
                    <rect x="8" y="26" width="104" height="6" rx="3" fill="#a78bfa"/><rect x="8" y="110" width="104" height="6" rx="3" fill="#a78bfa"/>
                </svg>
            </div>
            <h1>Time's Music</h1>
            <div class="subtitle">Гитарные каверы · Слушайте с удовольствием</div>
        </header>

        <nav>
            <input type="text" id="search-input" class="search-input" placeholder="🔍 Поиск треков...">
        </nav>

        <div class="section-title">🎵 Мои записи</div>
        <main class="music-grid" id="tracks-container">
            <p style="color:var(--text-secondary);text-align:center;padding:2rem;">Загрузка треков...</p>
        </main>

        <div class="player-bar">
            <div class="track-info">
                <h4 id="player-title">Выберите трек</h4>
                <p id="player-artist">Исполнитель</p>
            </div>
            <audio id="main-audio" controls></audio>
        </div>
    </div>

    <script>
        // ============ НАСТРОЙКИ ============
        const GITHUB_OWNER = 'TimeQQ';
        const GITHUB_REPO = 'MyMusicSite';
        // =================================

        // Экран загрузки
        const loadingScreen = document.getElementById('loadingScreen');
        const mainContent = document.getElementById('mainContent');

        // Частицы на фоне
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 6 + 's';
            particle.style.animationDuration = (4 + Math.random() * 6) + 's';
            particlesContainer.appendChild(particle);
        }

        // Скрываем экран загрузки через 2.5 секунды
        setTimeout(() => {
            loadingScreen.classList.add('hidden');
            mainContent.classList.add('visible');
        }, 2500);

        const container = document.getElementById('tracks-container');
        const audio = document.getElementById('main-audio');
        const playerTitle = document.getElementById('player-title');
        const playerArtist = document.getElementById('player-artist');
        const searchInput = document.getElementById('search-input');

        let playlist = [];

        async function loadTracks() {
            try {
                const url = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/music`;
                const r = await fetch(url);
                if (!r.ok) {
                    container.innerHTML = '<p style="color:var(--text-secondary);text-align:center;padding:2rem;">Создай папку music/ с MP3 файлами</p>';
                    return;
                }
                const files = await r.json();
                
                playlist = files
                    .filter(f => f.name.toLowerCase().endsWith('.mp3'))
                    .map(f => ({
                        name: f.name.replace(/\.mp3$/i, '').replace(/[-_]/g, ' '),
                        artist: 'Time\'s Music',
                        file: f.download_url
                    }));
                
                renderTracks();
            } catch(e) {
                container.innerHTML = '<p style="color:#ff4444;text-align:center;padding:2rem;">Ошибка загрузки</p>';
            }
        }

        function renderTracks() {
            const q = searchInput.value.toLowerCase();
            const filtered = playlist.filter(t => 
                t.name.toLowerCase().includes(q) || 
                t.artist.toLowerCase().includes(q)
            );
            
            container.innerHTML = '';
            
            if (!filtered.length) {
                container.innerHTML = '<p style="color:var(--text-secondary);text-align:center;padding:2rem;">Ничего не найдено</p>';
                return;
            }
            
            filtered.forEach((t, i) => {
                const card = document.createElement('div');
                card.className = 'track-card';
                card.style.animationDelay = (i * 0.05) + 's';
                card.innerHTML = `
                    <div class="track-title">${esc(t.name)}</div>
                    <div class="track-artist">${esc(t.artist)}</div>
                `;
                
                card.addEventListener('click', () => {
                    document.querySelectorAll('.track-card.active').forEach(c => c.classList.remove('active'));
                    card.classList.add('active');
                    audio.src = t.file;
                    playerTitle.textContent = t.name;
                    playerArtist.textContent = t.artist;
                    audio.play().catch(() => {});
                });
                
                container.appendChild(card);
            });
        }

        function esc(str) {
            const div = document.createElement('div');
            div.textContent = str || '';
            return div.innerHTML;
        }

        searchInput.addEventListener('input', renderTracks);

        audio.addEventListener('ended', () => {
            const idx = playlist.findIndex(t => t.file === audio.src);
            if (idx < playlist.length - 1) {
                const next = playlist[idx + 1];
                audio.src = next.file;
                playerTitle.textContent = next.name;
                playerArtist.textContent = next.artist;
                audio.play();
            }
        });

        loadTracks();
        console.log('🎸 Time\'s Music готов!');
    </script>
</body>
</html>
